    <main>
        <div class="container02">
            <div class="registro01">
                <h2>Formulario</h2>
            </div><br>


            <form class="row g-3">

                <div class="col-md-4">
                    <label for="nombre" class="form-label">Nombres</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="nombre" placeholder="Ingresa tus Nombres.." required
                            oninvalid="this.setCustomValidity('No olvides ingresar tus Nombres! ✍️' )"
                            oninput="this.setCustomValidity('')">
                    </div>

                </div>

                <div class="col-md-4">
                    <label for="apellido" class="form-label">Apellidos</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="apellido" placeholder="Ingresa tus Apellidos.."
                            required oninvalid="this.setCustomValidity('No olvides ingresar tus Apellidos! ✍️' )"
                            oninput="this.setCustomValidity('')">
                    </div>
                </div>

                <div class="col-md-4">
                    <label for="usuario" class="form-label">Correo</label>
                    <div class="input-group">
                        <span class="input-group-text">@</span>
                        <input type="email" class="form-control" id="usuario" placeholder="Ingresa tu Correo.." required
                            oninvalid="this.setCustomValidity('No olvides ingresar tu Correo! ✍️' )"
                            oninput="this.setCustomValidity('')">
                    </div>
                </div>

                <div class="col-md-4">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="Ingresa tu Contraseña.."
                            required oninvalid="this.setCustomValidity('No olvides ingresar tu Contraseña! ✍️' )"
                            oninput="this.setCustomValidity('')">
                    </div>
                </div>

                <div class="col-md-4">
                    <label for="confirmar" class="form-label">Confirma tu Contraseña</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirmar"
                            placeholder="La contraseña debe ser la misma.." required
                            oninvalid="this.setCustomValidity('Ingresa nuevamente tu Contraseña! ✍️' )"
                            oninput="this.setCustomValidity('')">
                    </div>
                </div>

                <div class="col-md-4">
                    <label for="telefono" class="form-label">Telefono</label>
                    <div class="input-group">
                        <input type="tel" class="form-control" id="telefono" placeholder="+51" pattern="[0-9]+" required
                            oninvalid="this.setCustomValidity('No olvides ingresar tu Telefono! ✍️' )"
                            oninput="this.setCustomValidity('')">
                    </div>
                </div>

                <div class="col-md-4">
                    <label for="pais" class="form-label">País</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="pais" placeholder="Ingresa tu Pais.." required
                            oninvalid="this.setCustomValidity('No olvides ingresar tu Pais! ✍️' )"
                            oninput="this.setCustomValidity('')">
                    </div>
                </div>

                <div class="col-md-4">
                    <label for="genero" class="form-label">Género</label>
                    <div class="genero">
                        <select class="form-select" id="genero" required>
                            <option value="" disabled selected>Selecciona una opción...</option>
                            <option>Masculino</option>
                            <option>Femenino</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Seleccione su apreciación de la pagina</label>

                    <div class="seleccion">
                        <label>
                            <input type="radio" name="apreciacion" value="bajo"> Bajo
                        </label>

                        <label>
                            <input type="radio" name="apreciacion" value="medio"> Medio
                        </label>

                        <label>
                            <input type="radio" name="apreciacion" value="alto"> Alto
                        </label>
                    </div>

                </div>

                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terminos" required>
                        <label class="form-check-label" for="terminos">
                            Acepto todos los terminos y condiciones.
                        </label>
                    </div>
                </div>

                <div class="col-12 botones">
                    <button class="btn btn-primary" type="reset">Limpiar</button>
                    <button class="btn btn-primary" type="submit">Enviar</button>
                </div>

            </form>
        </div>
